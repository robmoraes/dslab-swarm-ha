services:
  traefik:
    image: traefik:v3.6.1

    command:
      - --providers.swarm=true
      - --providers.swarm.exposedByDefault=false

      - --entrypoints.web.address=:80

      - --api.insecure=true

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - traefik-public

    deploy:
      replicas: 1

      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: any

networks:
  traefik-public:
    external: true
